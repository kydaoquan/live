<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>

<title>KĐQ STREAM SYSTEM</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    -webkit-tap-highlight-color:transparent;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#0F1117;
    color:white;
}

/* ================= MAIN UI ================= */

#main-container{
    width:100%;
    max-width:420px;
    margin:auto;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    padding:28px;
}

.logo-box{
    width:110px;
    height:110px;
    margin:0 auto 30px;
    border-radius:50%;
    background:rgba(77,128,245,0.08);
    border:1px solid rgba(77,128,245,0.3);
    display:flex;
    align-items:center;
    justify-content:center;
}

.logo-box svg{
    width:52px;
    height:52px;
    fill:#4D80F5;
}

.title{
    text-align:center;
    font-size:28px;
    font-weight:900;
    margin-bottom:8px;
    letter-spacing:1px;
}

.subtitle{
    text-align:center;
    opacity:.45;
    margin-bottom:40px;
    font-size:14px;
}

.input-group{
    position:relative;
    margin-bottom:24px;
}

.input-label{
    position:absolute;
    top:-10px;
    left:18px;
    background:#0F1117;
    padding:0 8px;
    font-size:12px;
    color:#4D80F5;
    font-weight:700;
    z-index:2;
}

.input,
.select{
    width:100%;
    height:64px;
    border:none;
    outline:none;
    border-radius:18px;
    background:#191C24;
    color:white;
    padding:0 20px;
    font-size:20px;
    font-weight:700;
    border:1.5px solid rgba(255,255,255,.08);
    transition:.2s;
}

.input{
    text-align:center;
}

.select{
    appearance:none;
    text-align:center;
    text-align-last:center;
}

.input:focus,
.select:focus{
    border-color:#4D80F5;
}

.start-btn{
    width:100%;
    height:60px;
    border:none;
    border-radius:18px;
    background:#4D80F5;
    color:white;
    font-size:18px;
    font-weight:800;
    margin-top:10px;
    cursor:pointer;
}

.start-btn:active{
    transform:scale(.985);
}

/* ================= IFRAME ================= */

#stream-frame{
    position:fixed;
    inset:0;
    width:100vw;
    height:100vh;
    border:none;
    display:none;
    background:black;
    z-index:10;
}

/* ================= CLOSE BTN ================= */

#close-btn{
    position:fixed;
    top:20px;
    left:20px;
    width:52px;
    height:52px;
    border-radius:50%;
    border:none;
    background:rgba(0,0,0,.6);
    color:white;
    font-size:22px;
    display:none;
    align-items:center;
    justify-content:center;
    z-index:20;
    backdrop-filter:blur(10px);
}

/* ================= LOADING ================= */

#loading{
    position:fixed;
    inset:0;
    background:black;
    z-index:15;
    display:none;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    gap:20px;
}

.loader{
    width:60px;
    height:60px;
    border-radius:50%;
    border:4px solid rgba(255,255,255,.1);
    border-top-color:#4D80F5;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    to{
        transform:rotate(360deg);
    }
}

.loading-text{
    font-size:15px;
    opacity:.7;
}
</style>
</head>

<body>

<div id="main-container">

    <div class="logo-box">
        <svg viewBox="0 0 24 24">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10
            10-4.48 10-10S17.52 2 12 2zm0 18c-4.42
            0-8-3.58-8-8s3.58-8 8-8
            8 3.58 8 8-3.58 8-8 8z"/>
        </svg>
    </div>

    <div class="title">KĐQ STREAM SYSTEM</div>
    <div class="subtitle">Ultra Stable Mobile Streaming</div>

    <div class="input-group">
        <div class="input-label">CHANNEL ID</div>
        <input
            id="channel"
            class="input"
            value="quocdang"
            placeholder="Nhập ID..."
        />
    </div>

    <div class="input-group">
        <div class="input-label">QUALITY</div>

        <select
            id="quality"
            class="select"
            onchange="changePreset()"
        >
            <option value="720">HD 720P</option>
            <option value="1080" selected>FULL HD 1080P</option>
            <option value="1440">2K 1440P</option>
        </select>
    </div>

    <div class="input-group">
        <div class="input-label">BITRATE</div>

        <input
            id="bitrate"
            class="input"
            type="number"
            value="4000"
        />
    </div>

    <button class="start-btn" onclick="startStream()">
        BẮT ĐẦU PHÁT
    </button>

</div>

<!-- LOADING -->

<div id="loading">
    <div class="loader"></div>
    <div class="loading-text">Đang khởi tạo camera...</div>
</div>

<!-- CLOSE -->

<button id="close-btn" onclick="stopStream()">
✕
</button>

<!-- IFRAME -->

<iframe
    id="stream-frame"
    allow="camera *; microphone *; autoplay *; fullscreen *"
    allowfullscreen>
</iframe>

<script>

let wakeLock = null;

const frame = document.getElementById("stream-frame");
const loading = document.getElementById("loading");
const closeBtn = document.getElementById("close-btn");
const mainUI = document.getElementById("main-container");

function changePreset(){

    const quality = document.getElementById("quality").value;
    const bitrate = document.getElementById("bitrate");

    if(quality === "720"){
        bitrate.value = 2500;
    }

    if(quality === "1080"){
        bitrate.value = 4000;
    }

    if(quality === "1440"){
        bitrate.value = 6500;
    }
}

async function requestWakeLock(){

    try{

        if("wakeLock" in navigator){

            wakeLock = await navigator.wakeLock.request("screen");

            wakeLock.addEventListener("release",()=>{
                console.log("WakeLock released");
            });

        }

    }catch(err){
        console.log(err);
    }
}

document.addEventListener("visibilitychange", async ()=>{

    if(
        wakeLock !== null &&
        document.visibilityState === "visible"
    ){

        wakeLock = await navigator.wakeLock.request("screen");

    }

});

function getResolutionData(){

    const quality = document.getElementById("quality").value;

    if(quality === "720"){

        return {
            width:1280,
            height:720
        };

    }

    if(quality === "1440"){

        return {
            width:2560,
            height:1440
        };

    }

    return {
        width:1920,
        height:1080
    };
}

async function startStream(){

    const channel = document.getElementById("channel").value.trim();

    const bitrate = document.getElementById("bitrate").value.trim();

    if(!channel){

        alert("Nhập Channel ID");
        return;

    }

    if(!bitrate || bitrate <= 0){

        alert("Bitrate không hợp lệ");
        return;

    }

    const resolution = getResolutionData();

    /* ===== BASE64 DOMAIN ===== */

    const secretDomain = atob("aHR0cHM6Ly92ZG8ubmluamEv");

    /* ===== VDO LINK ===== */

    const url =
        `${secretDomain}?push=${channel}`
        + `&webcam`
        + `&autostart`
        + `&noscreen`
        + `&cleanoutput`
        + `&transparent`
        + `&fullscreen`
        + `&noheader`
        + `&label=0`
        + `&src=1`
        + `&noaudio`
        + `&codec=vp8`
        + `&fps=30`
        + `&quality=80`
        + `&bitrate=${bitrate}`
        + `&width=${resolution.width}`
        + `&height=${resolution.height}`;

    /* ===== FULLSCREEN ===== */

    try{

        if(document.documentElement.requestFullscreen){

            await document.documentElement.requestFullscreen();

        }

    }catch(err){
        console.log(err);
    }

    /* ===== UI ===== */

    mainUI.style.display = "none";

    loading.style.display = "flex";

    closeBtn.style.display = "flex";

    /* ===== LOAD IFRAME ===== */

    setTimeout(()=>{

        frame.src = url;

        frame.style.display = "block";

    },400);

    frame.onload = ()=>{

        loading.style.display = "none";

    };

    /* ===== WAKELOCK ===== */

    requestWakeLock();

}

function stopStream(){

    frame.src = "";

    frame.style.display = "none";

    closeBtn.style.display = "none";

    loading.style.display = "none";

    mainUI.style.display = "flex";

    if(document.fullscreenElement){

        document.exitFullscreen();

    }

    if(wakeLock){

        wakeLock.release();
        wakeLock = null;

    }

}

/* ===== DISABLE RIGHT CLICK ===== */

document.addEventListener("contextmenu",e=>{
    e.preventDefault();
});

</script>

</body>
</html>
