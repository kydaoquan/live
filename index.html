<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>KĐQ STREAMER</title>
    <style>
        :root { --primary: #4D80F5; --bg: #0F1117; --card: #191C24; }
        * { box-sizing: border-box; }
        body, html { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:var(--bg); color:white; font-family:-apple-system, sans-serif; }
        
        #main-container { width:90%; max-width:400px; height:100%; margin:auto; display:flex; flex-direction:column; justify-content:center; }
        .logo { width:80px; height:80px; margin:0 auto 20px; background:rgba(77,128,245,.1); border-radius:20px; display:flex; align-items:center; justify-content:center; font-size:32px; color:var(--primary); }
        .title { text-align:center; font-size:24px; font-weight:800; margin-bottom:5px; }
        .subtitle { text-align:center; opacity:0.5; font-size:13px; margin-bottom:30px; }
        
        .input-group { margin-bottom:15px; }
        .label { font-size:11px; font-weight:700; color:var(--primary); margin-bottom:5px; margin-left:5px; letter-spacing:0.5px; }
        .select { width:100%; height:55px; border:none; border-radius:15px; background:var(--card); color:white; padding:0 20px; font-size:16px; font-weight:600; appearance:none; }
        
        .start-btn { width:100%; height:55px; border:none; border-radius:15px; background:var(--primary); color:white; font-size:16px; font-weight:800; margin-top:20px; cursor:pointer; box-shadow:0 10px 20px rgba(77,128,245,.2); }
        .start-btn:active { transform:scale(0.98); }

        #stream-frame { position:fixed; inset:0; width:100%; height:100%; border:none; display:none; background:black; z-index:10; }
        #loading { position:fixed; inset:0; background:black; z-index:20; display:none; align-items:center; justify-content:center; flex-direction:column; }
        .spinner { width:40px; height:40px; border:3px solid rgba(255,255,255,.1); border-top-color:var(--primary); border-radius:50%; animation:spin 0.8s linear infinite; margin-bottom:15px; }
        @keyframes spin { to { transform:rotate(360deg); } }
    </style>
</head>
<body>

<div id="main-container">
    <div class="logo">⚡</div>
    <div class="title">KĐQ STREAMER</div>
    <div class="subtitle">CHUYÊN NGHIỆP & ỔN ĐỊNH</div>

    <div class="input-group">
        <div class="label">CHANNEL ID</div>
        <input id="channel" class="select" value="quocdang" style="text-align:center;" />
    </div>

    <div class="input-group">
        <div class="label">ĐỘ PHÂN GIẢI</div>
        <select id="quality" class="select">
            <option value="1080">FULL HD 1080P</option>
            <option value="720" selected>HD 720P</option>
        </select>
    </div>

    <div class="input-group">
        <div class="label">BITRATE (Kbps)</div>
        <select id="bitrate" class="select">
            <option value="6000">6000 (Cực nét)</option>
            <option value="4000" selected>4000 (Ổn định)</option>
            <option value="2500">2500 (Tiết kiệm)</option>
        </select>
    </div>

    <button class="start-btn" onclick="startStream()">BẮT ĐẦU PHÁT</button>
</div>

<div id="loading">
    <div class="spinner"></div>
    <div style="font-size:14px; opacity:0.7;">Đang kết nối camera...</div>
</div>

<iframe id="stream-frame" allow="camera *; microphone *; autoplay *; fullscreen *; display-capture *" allowfullscreen></iframe>

<script>
    function startStream() {
        const channel = document.getElementById("channel").value.trim();
        const quality = document.getElementById("quality").value;
        const bitrate = document.getElementById("bitrate").value;

        const baseUrl = (typeof AndroidBridge !== 'undefined') ? AndroidBridge.getBaseUrl() : "https://vdo.ninja/";
        const params = (typeof AndroidBridge !== 'undefined') ? AndroidBridge.getCommonParams() : "webcam&autostart&cleanoutput&noheader&label=0&fullscreen&codec=vp8";
        
        const frame = document.getElementById("stream-frame");
        frame.src = `${baseUrl}?push=${channel}&${params}&quality=${quality}&bitrate=${bitrate}`;
        
        document.getElementById("main-container").style.display = "none";
        document.getElementById("loading").style.display = "flex";
        
        frame.onload = () => {
            document.getElementById("loading").style.display = "none";
            frame.style.display = "block";
        };
    }
</script>

</body>
</html>
