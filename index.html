<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KĐQ STREAMER</title>
    <style>
        body, html { margin:0; padding:0; width:100%; height:100%; background:#000; color:white; font-family:sans-serif; }
        #main-container { width:100%; height:100%; display:flex; flex-direction:column; justify-content:center; align-items:center; }
        .input { width:80%; height:50px; margin-bottom:20px; text-align:center; border-radius:10px; border:none; }
        .btn { width:80%; height:50px; background:#4D80F5; border:none; color:white; font-weight:bold; border-radius:10px; }
        #stream-frame { position:fixed; inset:0; width:100vw; height:100vh; border:none; display:none; }
    </style>
</head>
<body>

<div id="main-container">
    <input id="channel" class="input" value="quocdang" />
    <button class="btn" onclick="startStream()">BẮT ĐẦU PHÁT</button>
</div>

<iframe id="stream-frame" allow="camera *; microphone *; autoplay *; fullscreen *; display-capture *"></iframe>

<script>
    function startStream() {
        const channel = document.getElementById("channel").value.trim();
        const baseUrl = (typeof AndroidBridge !== 'undefined') ? AndroidBridge.getBaseUrl() : "https://vdo.ninja/";
        const params = (typeof AndroidBridge !== 'undefined') ? AndroidBridge.getCommonParams() : "webcam&autostart";
        
        const frame = document.getElementById("stream-frame");
        frame.src = `${baseUrl}?push=${channel}&${params}`;
        document.getElementById("main-container").style.display = "none";
        frame.style.display = "block";
    }
</script>
</body>
</html>
