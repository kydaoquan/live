<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta
name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
/>

<title>KĐQ STREAM SYSTEM</title>

<style>
body {
        margin: 0;
        padding: 0;
        overflow-x: hidden; /* Cấm không cho cuộn ngang */
        width: 100vw;       /* Ép rộng bằng chiều ngang màn hình */
        height: 100vh;      /* Ép cao bằng chiều dọc màn hình */
    }

    iframe, video, canvas {
        max-width: 100%;    /* Không cho phép bất kỳ thành phần nào tràn ra ngoài */
        height: auto;
    }
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    -webkit-tap-highlight-color:transparent;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#0F1117;
    color:white;
}

/* ================= MAIN ================= */

#main-container{

    width:100%;
    max-width:420px;
    height:100%;

    margin:auto;

    display:flex;
    flex-direction:column;
    justify-content:center;

    padding:28px;
}

.logo-box{

    width:110px;
    height:110px;

    margin:0 auto 30px;

    border-radius:50%;

    background:rgba(77,128,245,.08);

    border:1px solid rgba(77,128,245,.3);

    display:flex;
    align-items:center;
    justify-content:center;
}

.logo-box svg{
    width:52px;
    height:52px;
    fill:#4D80F5;
}

.title{

    text-align:center;

    font-size:28px;
    font-weight:900;

    letter-spacing:1px;

    margin-bottom:8px;
}

.subtitle{

    text-align:center;

    opacity:.45;

    font-size:14px;

    margin-bottom:40px;
}

.input-group{

    position:relative;

    margin-bottom:24px;
}

.input-label{

    position:absolute;

    top:-10px;
    left:18px;

    background:#0F1117;

    padding:0 8px;

    font-size:12px;
    font-weight:700;

    color:#4D80F5;

    z-index:2;
}

.input,
.select{

    width:100%;
    height:64px;

    border:none;
    outline:none;

    border-radius:18px;

    background:#191C24;

    color:white;

    border:1.5px solid rgba(255,255,255,.08);

    padding:0 20px;

    font-size:20px;
    font-weight:700;

    transition:.2s;
}

.input{
    text-align:center;
}

.select{

    appearance:none;

    text-align:center;
    text-align-last:center;
}

.input:focus,
.select:focus{

    border-color:#4D80F5;
}

.start-btn{

    width:100%;
    height:60px;

    border:none;
    border-radius:18px;

    background:#4D80F5;

    color:white;

    font-size:18px;
    font-weight:800;

    margin-top:10px;

    cursor:pointer;
}

.start-btn:active{
    transform:scale(.985);
}

/* ================= STREAM ================= */

#stream-frame{

    position:fixed;

    inset:0;

    width:100vw;
    height:100vh;

    border:none;

    display:none;

    background:black;

    z-index:10;
}

/* ================= CLOSE ================= */

#close-btn{

    position:fixed;

    top:20px;
    left:20px;

    width:52px;
    height:52px;

    border:none;

    border-radius:50%;

    background:rgba(0,0,0,.6);

    color:white;

    font-size:22px;

    display:none;

    align-items:center;
    justify-content:center;

    backdrop-filter:blur(10px);

    z-index:20;
}

/* ================= LOADING ================= */

#loading{

    position:fixed;

    inset:0;

    background:black;

    z-index:15;

    display:none;

    align-items:center;
    justify-content:center;

    flex-direction:column;

    gap:20px;
}

.loader{

    width:60px;
    height:60px;

    border-radius:50%;

    border:4px solid rgba(255,255,255,.1);

    border-top-color:#4D80F5;

    animation:spin 1s linear infinite;
}

@keyframes spin{
    to{
        transform:rotate(360deg);
    }
}

.loading-text{

    font-size:15px;

    opacity:.7;
}

</style>

</head>

<body>

<div id="main-container">

    <div class="logo-box">

        <svg viewBox="0 0 24 24">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10
            10-4.48 10-10S17.52 2 12 2zm0 18c-4.42
            0-8-3.58-8-8s3.58-8 8-8
            8 3.58 8 8-3.58 8-8 8z"/>
        </svg>

    </div>

    <div class="title">
        KĐQ STREAM SYSTEM
    </div>

    <div class="subtitle">
        Ultra Stable Mobile Streaming
    </div>

    <!-- CHANNEL -->

    <div class="input-group">

        <div class="input-label">
            CHANNEL ID
        </div>

        <input
        id="channel"
        class="input"
        placeholder="Nhập Channel ID..."
        value="quocdang"
        />

    </div>

    <!-- QUALITY -->

    <div class="input-group">

        <div class="input-label">
            QUALITY
        </div>

        <select
        id="quality"
        class="select"
        onchange="changePreset()"
        >

            <option value="720">
                HD 720P
            </option>

            <option value="1080" selected>
                FULL HD 1080P
            </option>

            <option value="1440">
                2K 1440P
            </option>

        </select>

    </div>

    <!-- BITRATE -->

    <div class="input-group">

        <div class="input-label">
            BITRATE
        </div>

        <input
        id="bitrate"
        class="input"
        type="number"
        value="4000"
        />

    </div>

    <button
    class="start-btn"
    onclick="startStream()"
    >
        BẮT ĐẦU PHÁT
    </button>

</div>

<!-- LOADING -->

<div id="loading">

    <div class="loader"></div>

    <div class="loading-text">
        Đang khởi tạo camera...
    </div>

</div>

<!-- CLOSE -->

<button
id="close-btn"
onclick="stopStream()"
>
✕
</button>

<!-- STREAM -->

<iframe
id="stream-frame"
allow="camera *; microphone *; autoplay *; fullscreen *"
allowfullscreen>
</iframe>

<script>

let wakeLock = null;

const frame =
document.getElementById("stream-frame");

const loading =
document.getElementById("loading");

const closeBtn =
document.getElementById("close-btn");

const mainUI =
document.getElementById("main-container");

/* ================= PRESET ================= */

function changePreset(){

    const quality =
    document.getElementById("quality").value;

    const bitrate =
    document.getElementById("bitrate");

    if(quality === "720"){
        bitrate.value = 2500;
    }

    if(quality === "1080"){
        bitrate.value = 4000;
    }

    if(quality === "1440"){
        bitrate.value = 6500;
    }
}

/* ================= WAKELOCK ================= */

async function requestWakeLock(){

    try{

        if("wakeLock" in navigator){

            wakeLock =
            await navigator.wakeLock.request("screen");

        }

    }catch(err){

        console.log(err);

    }
}

document.addEventListener(
"visibilitychange",
async ()=>{

    if(
        wakeLock !== null &&
        document.visibilityState === "visible"
    ){

        wakeLock =
        await navigator.wakeLock.request("screen");

    }

});

/* ================= RESOLUTION ================= */

function getResolution(){

    const quality =
    document.getElementById("quality").value;

    if(quality === "720"){

        return {
            width:1280,
            height:720
        };

    }

    if(quality === "1440"){

        return {
            width:2560,
            height:1440
        };

    }

    return {
        width:1920,
        height:1080
    };
}

/* ================= START ================= */

async function startStream(){

    const channel =
    document.getElementById("channel")
    .value
    .trim();

    const bitrate =
    document.getElementById("bitrate")
    .value
    .trim();

    if(!channel){

        alert("Nhập Channel ID");

        return;
    }

    if(!bitrate || bitrate <= 0){

        alert("Bitrate không hợp lệ");

        return;
    }

    const resolution =
    getResolution();

    /* ================= HIDE DOMAIN ================= */

    const a = "aHR0";
    const b = "cHM6";
    const c = "Ly92";
    const d = "ZG8u";
    const e = "bmlu";
    const f = "amEv";

    const domain =
    atob(a+b+c+d+e+f);

    /* ================= PARAMS ================= */

    const params = [

        `push=${channel}`,

        "webcam",

        "autostart",

        "noscreen",

        "cleanoutput",

        "fullscreen",

        "noheader",

        "label=0",

        "src=1",

        "noaudio",

        "codec=vp8",

        "fps=30",

        "quality=80",

        `bitrate=${bitrate}`,

        `width=${resolution.width}`,

        `height=${resolution.height}`

    ];

    const finalURL =
    domain + "?" + params.join("&");

    /* ================= BLOB HIDE ================= */

    const blobHTML = `

<!DOCTYPE html>

<html>

<head>

<meta
name="viewport"
content="width=device-width,initial-scale=1"
/>

<style>

html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:black;
}

iframe{
    border:none;
    width:100vw;
    height:100vh;
}

</style>

</head>

<body>

<iframe
allow="camera *; microphone *; autoplay *; fullscreen *"
allowfullscreen
src="${finalURL}">
</iframe>

</body>

</html>

`;

    const blob =
    new Blob(
        [blobHTML],
        {
            type:"text/html"
        }
    );

    const blobURL =
    URL.createObjectURL(blob);

    /* ================= FULLSCREEN ================= */

    try{

        if(
            document.documentElement
            .requestFullscreen
        ){

            await
            document.documentElement
            .requestFullscreen();

        }

    }catch(err){

        console.log(err);

    }

    /* ================= UI ================= */

    mainUI.style.display = "none";

    loading.style.display = "flex";

    closeBtn.style.display = "flex";

    /* ================= LOAD ================= */

    setTimeout(()=>{

        frame.src = blobURL;

        frame.style.display = "block";

    },400);

    frame.onload = ()=>{

        loading.style.display = "none";

    };

    /* ================= WAKELOCK ================= */

    requestWakeLock();

}

/* ================= STOP ================= */

function stopStream(){

    frame.src = "";

    frame.style.display = "none";

    closeBtn.style.display = "none";

    loading.style.display = "none";

    mainUI.style.display = "flex";

    if(document.fullscreenElement){

        document.exitFullscreen();

    }

    if(wakeLock){

        wakeLock.release();

        wakeLock = null;
    }
}

/* ================= BASIC PROTECT ================= */

document.addEventListener(
"contextmenu",
e=>{
    e.preventDefault();
}
);

document.onkeydown = function(e){

    if(e.keyCode === 123){
        return false;
    }

    if(
        e.ctrlKey &&
        e.shiftKey &&
        ['I','J','C'].includes(
            e.key.toUpperCase()
        )
    ){
        return false;
    }

    if(
        e.ctrlKey &&
        e.key.toUpperCase() === 'U'
    ){
        return false;
    }

};

/* ================= DEVTOOLS DETECT ================= */

setInterval(()=>{

    const before = new Date();

    debugger;

    const after = new Date();

    if(after - before > 100){

        document.body.innerHTML = "";

    }

},1000);

</script>

</body>
</html>
