<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KĐQ STREAMER</title>
    <style>
        :root { --primary: #4D80F5; --bg: #0F1117; --card: #1C1F26; --shadow: 0 8px 30px rgba(0,0,0,0.5); }
        * { box-sizing: border-box; }
        body, html { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:var(--bg); color:white; font-family: 'Segoe UI', Roboto, sans-serif; }
        
        #main-container { width:90%; max-width:400px; height:100%; margin:auto; display:flex; flex-direction:column; justify-content:center; }
        
        .logo { width:90px; height:90px; margin:0 auto 25px; background:linear-gradient(135deg, #4D80F5, #2A5298); border-radius:25px; display:flex; align-items:center; justify-content:center; font-size:40px; box-shadow: var(--shadow); }
        .title { text-align:center; font-size:28px; font-weight:800; margin-bottom:5px; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        .subtitle { text-align:center; opacity:0.6; font-size:14px; margin-bottom:40px; }
        
        .input-group { margin-bottom:20px; }
        .label { font-size:12px; font-weight:700; color:var(--primary); margin-bottom:8px; margin-left:5px; text-transform:uppercase; }
        .select { width:100%; height:60px; border:none; border-radius:18px; background:var(--card); color:white; padding:0 25px; font-size:16px; font-weight:600; box-shadow: var(--shadow); outline:none; }
        
        .start-btn { width:100%; height:60px; border:none; border-radius:18px; background:var(--primary); color:white; font-size:18px; font-weight:900; margin-top:30px; cursor:pointer; box-shadow: 0 10px 25px rgba(77,128,245,0.4); transition: transform 0.2s; }
        .start-btn:active { transform:scale(0.96); }

        #stream-frame { position:fixed; inset:0; width:100%; height:100%; border:none; display:none; z-index:10; }
        #loading { position:fixed; inset:0; background:var(--bg); z-index:20; display:none; align-items:center; justify-content:center; flex-direction:column; }
        .spinner { width:50px; height:50px; border:4px solid rgba(255,255,255,0.1); border-top-color:var(--primary); border-radius:50%; animation:spin 0.8s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }
    </style>
</head>
<body>

<div id="main-container">
    <div class="logo">🎥</div>
    <div class="title">KĐQ STREAMER</div>
    <div class="subtitle">ULTRA HIGH DEFINITION SYSTEM</div>

    <div class="input-group">
        <div class="label">CHANNEL ID</div>
        <input id="channel" class="select" value="quocdang" style="text-align:center;" />
    </div>

    <div class="input-group">
        <div class="label">RESOLUTION</div>
        <select id="quality" class="select">
            <option value="2560">2K (2560P)</option>
            <option value="1080">1080P FULL HD</option>
            <option value="720" selected>720P HD</option>
        </select>
    </div>

    <div class="input-group">
        <div class="label">BITRATE (KBPS)</div>
        <select id="bitrate" class="select">
            <option value="12000">12000 (2K Ultra)</option>
            <option value="6000" selected>6000 (High)</option>
            <option value="4000">4000 (Stable)</option>
        </select>
    </div>

    <button class="start-btn" onclick="startStream()">BẮT ĐẦU PHÁT</button>
</div>

<div id="loading">
    <div class="spinner"></div>
    <p style="margin-top:20px; font-weight:700;">ĐANG KHỞI TẠO CAMERA...</p>
</div>

<iframe id="stream-frame" allow="camera *; microphone *; autoplay *; fullscreen *; display-capture *" allowfullscreen></iframe>

<script>
    function startStream() {
        const channel = document.getElementById("channel").value.trim();
        const quality = document.getElementById("quality").value;
        const bitrate = document.getElementById("bitrate").value;

        // CHỖ NÀY GIẤU LINK: Nếu chạy trong App, nó gọi qua Java, không hiện link.
        // Nếu chạy ngoài trình duyệt, nó mới dùng link dự phòng.
        const baseUrl = (typeof AndroidBridge !== 'undefined') ? AndroidBridge.getBaseUrl() : "https://vdo.ninja/";
        const params = (typeof AndroidBridge !== 'undefined') ? AndroidBridge.getCommonParams() : "webcam&autostart&cleanoutput&noheader&label=0&fullscreen&codec=vp8";
        
        const frame = document.getElementById("stream-frame");
        // Ghép link ở đây, người dùng chỉ nhìn thấy kết quả cuối cùng trên iframe
        frame.src = `${baseUrl}?push=${channel}&${params}&quality=${quality}&bitrate=${bitrate}`;
        
        document.getElementById("main-container").style.display = "none";
        document.getElementById("loading").style.display = "flex";
        
        frame.onload = () => {
            document.getElementById("loading").style.display = "none";
            frame.style.display = "block";
        };
    }
</script>

</body>
</html>
