<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KĐQ STREAM</title>
    <style>
        body, html { margin:0; width:100%; height:100%; overflow:hidden; background:#0F1117; color:white; font-family:sans-serif; }
        #main-container { width:100%; max-width:420px; height:100%; margin:auto; display:flex; flex-direction:column; justify-content:center; padding:28px; }
        .input, .select { width:100%; height:64px; border:none; border-radius:18px; background:#191C24; color:white; text-align:center; font-size:20px; font-weight:700; margin-bottom:20px; }
        .start-btn { width:100%; height:60px; border:none; border-radius:18px; background:#4D80F5; color:white; font-size:18px; font-weight:800; }
        #stream-frame { position:fixed; inset:0; width:100vw; height:100vh; border:none; display:none; background:black; }
        #loading { position:fixed; inset:0; background:black; z-index:15; display:none; align-items:center; justify-content:center; }
    </style>
</head>
<body>
    <div id="main-container">
        <input id="channel" class="input" value="quocdang" />
        <select id="quality" class="select"><option value="1080" selected>FULL HD 1080P</option></select>
        <button class="start-btn" onclick="startStream()">BẮT ĐẦU PHÁT</button>
    </div>
    <div id="loading">Đang khởi tạo camera...</div>
    <iframe id="stream-frame" allow="camera *; microphone *; autoplay *; fullscreen *; display-capture *" allowfullscreen></iframe>

    <script>
        async function startStream() {
            const channel = document.getElementById("channel").value.trim();
            const baseUrl = AndroidBridge.getBaseUrl();
            const params = AndroidBridge.getCommonParams();
            const finalURL = `${baseUrl}?push=${channel}&${params}&quality=${document.getElementById("quality").value}`;
            
            const frame = document.getElementById("stream-frame");
            frame.src = finalURL;
            frame.style.display = "block";
            document.getElementById("main-container").style.display = "none";
            document.getElementById("loading").style.display = "flex";
            frame.onload = () => document.getElementById("loading").style.display = "none";
        }
    </script>
</body>
</html>
